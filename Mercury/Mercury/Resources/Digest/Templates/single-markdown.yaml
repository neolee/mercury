id: single-markdown
version: v1
requiredPlaceholders:
  - exportDateTimeISO8601
  - digestTitle
  - fileSlug
  - articleTitle
  - articleURL
optionalPlaceholders:
  - articleAuthor
  - labelSource
  - labelAuthor
  - includeSummary
  - summaryTextBlockquote
  - summaryTargetLanguage
  - summaryDetailLevel
  - labelSummaryGeneratedByPrefix
  - labelSummaryGeneratedBySuffix
  - includeNote
  - noteText
  - labelNote
defaultParameters:
  - labelSource=Source
  - labelAuthor=Author
  - labelNote=My Take
  - labelSummaryGeneratedByPrefix=Generated by
  - labelSummaryGeneratedBySuffix=in
template: |
  +++
  date = '{{exportDateTimeISO8601}}'
  draft = false
  title = '{{digestTitle}}'
  slug = '{{fileSlug}}'
  +++

  **{{labelSource}}**: [{{articleTitle}}]({{articleURL}}) • **{{labelAuthor}}**: {{articleAuthor}}

  {{#includeSummary}}
  > {{summaryTextBlockquote}}
  >
  > - {{labelSummaryGeneratedByPrefix}} [Mercury Summary Agent](https://github.com/neolee/mercury) {{labelSummaryGeneratedBySuffix}} (`{{summaryTargetLanguage}}`, `{{summaryDetailLevel}}`)
  {{/includeSummary}}

  {{#includeNote}}
  **{{labelNote}}**: {{noteText}}
  {{/includeNote}}
