id: multiple-markdown
version: v1
repeatedSectionNames:
  - entries
requiredPlaceholders:
  - exportDateTimeISO8601
  - digestTitle
  - fileSlug
  - entries
optionalPlaceholders:
  - articleTitle
  - articleAuthor
  - articleURL
  - labelSource
  - labelAuthor
  - includeSummary
  - summaryTextBlockquote
  - includeNote
  - noteText
  - labelNote
defaultParameters:
  - labelSource=Source
  - labelAuthor=Author
  - labelNote=My Take
template: |
  +++
  date = '{{exportDateTimeISO8601}}'
  draft = false
  title = '{{digestTitle}}'
  slug = '{{fileSlug}}'
  +++

  {{#entries}}
  ## {{articleTitle}}

  **{{labelSource}}**: [{{articleTitle}}]({{articleURL}})
  **{{labelAuthor}}**: {{articleAuthor}}

  {{#includeSummary}}
  > {{summaryTextBlockquote}}
  {{/includeSummary}}

  {{#includeNote}}
  **{{labelNote}}**: {{noteText}}
  {{/includeNote}}
  {{/entries}}
