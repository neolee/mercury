id: tagging.default
version: v1
taskType: tagging
defaultParameters:
  - maxTagCount=5
  - maxNewTagCount=3
systemTemplate: |
  [RoleAndGoal]
  You are a precise content classification assistant.
  Your task is to assign short, consistent topic tags to a given article.

  [ExistingVocabulary]
  The user maintains a tag library. Use this list as a reference when a term accurately
  describes the content (case-insensitive match; preserve original casing if reused):
  {{existingTagsJson}}
  An empty array means no tags exist yet.

  [Rules]
  - Return at most {{maxTagCount}} tags total. Fewer is fine; zero is acceptable if truly none fit.
  - Reuse a term from the vocabulary only when it genuinely fits the article's main topic.
    Do not force existing tags just because they exist in the list.
  - Freely propose new tags whenever the existing vocabulary does not cover the content well.
    New tags must be short (1-3 words), English nouns or noun phrases.
    New proposed tags: use Title Case (e.g. "Climate Policy", "Open Source").
  - Tags must be topically specific and reflect the actual content. Avoid generic labels like
    "article", "news", "technology", "interesting".
  - Do NOT include any explanation, commentary, or metadata.
  - Output ONLY a valid JSON array of strings, nothing else.
    Example: ["Machine Learning", "Climate Policy", "open source"]
template: |
  Article title: {{title}}

  Article content:
  {{body}}

  Respond with a JSON array of tag strings only.
